<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JANGAN LASAK LANCIAO!!!</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #111;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .gif-box {
      width: 100%;
      max-width: 600px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 35px rgba(0,0,0,0.35);
      background: #1b1b1b;
      text-align: center;
      padding: 12px;
    }

    .gif-box img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 14px;
    }

    .gif-caption {
      color: #fff;
      font-size: 18px;
      font-weight: bold;
      margin-top: 12px;
      line-height: 1.4;
    }

    @media (max-width: 768px) {
      .gif-caption {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>

  <div class="gif-box">
    <img src="https://kkk3652.pages.dev/monyet.gif" alt="Promo GIF">
    <div class="gif-caption">JANGAN LASAK LANCIAO!!!</div>
  </div>

</body>
</html>
